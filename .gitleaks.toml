# gitleaks configuration. Extends the built-in rules and allowlists known
# non-secret placeholder values used in CI and tests, so the secret scan in
# .github/workflows/tests.yml doesn't fail on them.
title = "OIUEEI gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known non-secret test/CI placeholder values"
regexes = [
  '''test-secret-key-for-ci-only-not-for-production''',
  '''cloudinary://test_key:test_secret@test_cloud''',
]
