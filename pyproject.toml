[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
# E/W (pycodestyle) + F (pyflakes) cover what flake8 enforced; I adds isort.
select = ["E", "F", "I", "W"]
ignore = ["E203"]  # whitespace before ':' — conflicts with the formatter's slicing style

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"core/management/commands/seed_data/*.py" = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["core", "config"]

[tool.coverage.run]
source = ["core"]
branch = true
omit = ["*/migrations/*", "*/tests/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]
