name: Tests

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Least-privilege default token, and cancel superseded runs on the same ref.
# Every third-party action is pinned to a full commit SHA (the trailing comment
# is the tag it resolved from): a tag like v6 is movable, so pinning by tag
# would let a compromised action repo swap the code under us. When bumping,
# resolve the new SHA with: git ls-remote https://github.com/<owner>/<repo> "refs/tags/<tag>^{}"
# (fall back to refs/tags/<tag> when the tag is lightweight and has no ^{} line).
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Check for missing migrations
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only-not-for-production
          CLOUDINARY_URL: cloudinary://test_key:test_secret@test_cloud
        run: python manage.py makemigrations --check --dry-run

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting with Ruff
        run: ruff format --check .

      - name: Run tests with coverage
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only-not-for-production
          CLOUDINARY_URL: cloudinary://test_key:test_secret@test_cloud
        run: |
          pytest -v --cov=core --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage reports
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements/production.txt

      - name: Secret scan (gitleaks)
        # The sha256 is from gitleaks_8.21.2_checksums.txt on the release page —
        # verified before extraction so a tampered release asset (or a MITM'd
        # download) fails the job instead of running arbitrary code in CI.
        run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          echo "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --redact --no-banner
