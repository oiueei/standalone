name: Tests

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Least-privilege default token, and cancel superseded runs on the same ref.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Check for missing migrations
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only-not-for-production
          CLOUDINARY_URL: cloudinary://test_key:test_secret@test_cloud
        run: python manage.py makemigrations --check --dry-run

      - name: Run linting with black
        run: black --check .

      - name: Run linting with isort
        run: isort --check-only .

      - name: Run linting with flake8
        run: flake8 .

      - name: Run tests with coverage
        env:
          DJANGO_SECRET_KEY: test-secret-key-for-ci-only-not-for-production
          CLOUDINARY_URL: cloudinary://test_key:test_secret@test_cloud
        run: |
          pytest -v --cov=core --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements/production.txt

      - name: Secret scan (gitleaks)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xzf - gitleaks
          ./gitleaks detect --redact --no-banner
